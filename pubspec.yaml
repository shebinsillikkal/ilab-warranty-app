name: ilab_warranty
description: iLab Warranty Management Application
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.2.0
  image_picker: ^1.0.4
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  pdf: ^3.10.4
  path_provider: ^2.1.1
  intl: ^0.18.1
  provider: ^6.1.1
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.1
  qr_code_scanner: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
